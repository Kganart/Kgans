<!DOCTYPE html>
<html>
<head>
    <title>Irish Rail API - Direct Fetch</title>
</head>
<body>
    <label for="selction">Choose a station:</label>
    <select id="selction">
        <option value="Howth">Howth</option>
        <option value="Dublin%20Pearse">Dublin Pearse</option>
        <option value="Sutton">Sutton</option>
        <!-- Add whichever stations you need -->
    </select>

    <button onclick="myTrain()">Get Train Times</button>

    <div id="train-times"></div>

    <script>
    function myTrain() {
        // Grab the user’s chosen station
        const selectElement = document.querySelector('#selction');
        const selectedValue = selectElement.value;
        const selectedText = selectedValue.replace("%20", " ");
        
        // Irish Rail direct API URL (XML response)
        const apiUrl = `http://api.irishrail.ie/realtime/realtime.asmx/getStationDataByNameXML?StationDesc=${selectedValue}`;

        fetch(apiUrl, {
            // mode: 'cors' can be specified, but if the server 
            // does not allow cross-origin, it will fail from browsers.
            method: 'GET'
        })
        .then(response => response.text())  // Irish Rail returns XML
        .then(data => {
            // Parse the XML
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(data, "text/xml");

            // Extract train entries
            const trains = xmlDoc.getElementsByTagName("objStationData");

            // Build the output
            let output = `<h3>Next Trains from ${selectedText}</h3><div>`;
            for (let i = 0; i < trains.length; i++) {
                const train = trains[i];
                const destination = train.getElementsByTagName("Destination")[0].textContent;
                const dueIn = train.getElementsByTagName("Duein")[0].textContent;
                const direction = train.getElementsByTagName("Direction")[0].textContent;
                const trainType = train.getElementsByTagName("Traintype")[0].textContent;
                
                output += `
                    <div style="border:1px solid #ccc; margin:5px; padding:10px;">
                        <p><strong>${trainType} - ${direction}</strong></p>
                        <p>Destination: ${destination}</p>
                        <p>Due in: ${dueIn} mins</p>
                    </div>
                `;
            }
            output += "</div>";

            // Display result
            document.getElementById("train-times").innerHTML = output;
        })
        .catch(error => {
            console.error("Error fetching the train times:", error);
            document.getElementById("train-times").innerHTML = "Error loading train times.";
        });
    }
    </script>
</body>
</html>
